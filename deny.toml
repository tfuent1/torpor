# cargo-deny configuration for Torpor
# Run:  cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "workspace"
unsound = "workspace"
unused-ignored-advisory = "warn"
ignore = [
    # Example:
    # { id = "RUSTSEC-0000-0000", reason = "only affects the foo feature which we don't enable" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    { crate = "openssl", reason = "Pure-Rust crypto only. Use rustls or a crate with a rustls backend instead." },
    { crate = "native-tls", reason = "Pure-Rust crypto only. Configure reqwest with rustls-tls feature." },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []

